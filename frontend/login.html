<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Digital Ledger</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/styles.css">
    <link rel="stylesheet" href="/static/css/glass.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.12);
            border-radius: 16px;
            padding: 2rem;
            max-width: 360px;
            width: 90%;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: var(--shadow);
            color: var(--text);
        }
        .glass-card h2 {
            text-align: center;
            margin-bottom: 1.5rem;
            color: var(--primary);
        }
        .glass-card .input-group {
            margin-bottom: 1rem;
        }
        .glass-card label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }
        .glass-card input {
            width: 100%;
            padding: 0.6rem 0.8rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--surface-light);
            color: var(--text);
        }
        .glass-card button {
            width: 100%;
            padding: 0.6rem;
            background: var(--primary);
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }
        .glass-card button:hover {
            background: var(--primary-light);
        }
    </style>
</head>
<body>
    <div class="glass-card">
        <h2>Digital Ledger Login</h2>
        <form id="loginForm" onsubmit="event.preventDefault();">
            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" id="loginButton"><i class="fas fa-sign-in-alt"></i> Sign In</button>
        </form>
    </div>
    <script>
        // If already logged in, go to main app
        if (localStorage.getItem('loggedIn') === 'true') {
            window.location.href = '/';
        }
        // Simple auth handler (placeholder) – set loggedIn flag and redirect
        document.getElementById('loginButton').addEventListener('click', () => {
            // In a real app, validate credentials here
            localStorage.setItem('loggedIn', 'true');
            window.location.href = '/';
        });
    </script>
</body>
</html>
