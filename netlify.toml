[build]
  publish = "frontend"
  command = "echo 'Static frontend deployment only'"
  functions = "."
  ignore = "git diff --quiet HEAD^ HEAD -- backend/ config/ requirements.txt"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[build.environment]
  SKIP_PYTHON = "true"
  PYTHON_VERSION = "3.11.5"
